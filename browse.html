<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>题库浏览</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto+Sans+SC:400,500,700,900|Noto+Serif+SC:700,900&display=swap&subset=chinese-simplified">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Noto Sans SC',sans-serif;background:#0a0a0a;color:#fff}

.browse-app{display:flex;flex-direction:column;height:100%}

.top-bar{height:48px;background:rgba(0,0,0,.6);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.top-bar-left{display:flex;align-items:center;gap:16px}
.top-bar-title{font-size:14px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.85)}
.top-bar-sep{width:1px;height:18px;background:rgba(255,255,255,.12)}
.top-bar-sub{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px}
.btn-back{font-size:12px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12);padding:4px 14px;cursor:pointer;transition:all .2s;background:none;letter-spacing:2px}
.btn-back:hover{color:#fff;border-color:rgba(255,255,255,.3)}

.filter-bar{height:44px;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;padding:0 24px;gap:10px;flex-shrink:0;overflow-x:auto}
.filter-btn{font-size:11px;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.08);padding:4px 14px;cursor:pointer;transition:all .2s;background:none;letter-spacing:1px;white-space:nowrap;font-family:'Noto Sans SC',sans-serif}
.filter-btn:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)}
.filter-btn.active{color:#d4aa30;border-color:rgba(212,170,48,.4);background:rgba(212,170,48,.06)}
.filter-count{font-size:11px;color:rgba(255,255,255,.25);margin-left:auto;white-space:nowrap;letter-spacing:1px}

.search-bar{height:40px;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;padding:0 24px;flex-shrink:0}
.search-input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#fff;font-size:13px;padding:6px 14px;font-family:'Noto Sans SC',sans-serif;outline:none;max-width:400px}
.search-input:focus{border-color:rgba(212,170,48,.3)}
.search-input::placeholder{color:rgba(255,255,255,.2)}

.question-list{flex:1;overflow-y:auto;padding:16px 24px}
.q-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-bottom:10px;transition:all .2s;cursor:pointer}
.q-item:hover{border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.04)}
.q-item.expanded{border-color:rgba(212,170,48,.2);background:rgba(212,170,48,.02)}
.q-header{display:flex;align-items:center;padding:14px 18px;gap:14px}
.q-idx{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:900;color:rgba(255,255,255,.12);min-width:36px}
.q-body{flex:1}
.q-title{font-size:14px;color:rgba(255,255,255,.85);line-height:1.6}
.q-meta{display:flex;align-items:center;gap:10px;margin-top:4px}
.q-tag{font-size:10px;color:#d4aa30;border:1px solid rgba(212,170,48,.25);padding:1px 8px;letter-spacing:1px}
.q-type-tag{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px}
.q-answer-badge{font-size:11px;font-weight:700;padding:2px 10px;letter-spacing:1px;margin-left:auto}
.q-answer-badge.true{color:#4caf50;border:1px solid rgba(76,175,80,.25);background:rgba(76,175,80,.06)}
.q-answer-badge.false{color:#f44336;border:1px solid rgba(244,67,54,.25);background:rgba(244,67,54,.06)}
.q-detail{display:none;padding:0 18px 14px 68px;animation:fadeIn .3s ease}
.q-item.expanded .q-detail{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.q-explain-label{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:2px;margin-bottom:6px}
.q-explain-text{font-size:13px;color:rgba(255,255,255,.55);line-height:1.9;padding:10px 14px;background:rgba(255,255,255,.02);border-left:2px solid rgba(212,170,48,.2)}

.empty-state{text-align:center;padding:60px 20px;color:rgba(255,255,255,.2);font-size:14px;letter-spacing:2px}

@media(max-width:768px){
.question-list{padding:12px}
.q-header{padding:10px 12px;gap:10px}
.q-detail{padding:0 12px 10px 48px}
}
</style>
</head>
<body>
<script src="questions/data.js"></script>

<div class="browse-app">
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="top-bar-title">题库浏览</span>
      <span class="top-bar-sep"></span>
      <span class="top-bar-sub">QUESTION BANK · <span id="total-count">100</span>题</span>
    </div>
    <button class="btn-back" onclick="history.back()">返 回</button>
  </div>

  <div class="search-bar">
    <input class="search-input" id="search-input" type="text" placeholder="搜索题目关键词…">
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-cat="all">全部</button>
    <span class="filter-count" id="filter-count">共 100 题</span>
  </div>

  <div class="question-list" id="question-list"></div>
</div>

<script>
(function(){
'use strict';

var allQuestions=QUIZ_DATA;
var currentFilter='all';
var currentSearch='';

function getCategories(){
  var cats={};
  allQuestions.forEach(function(q){cats[q.point]=(cats[q.point]||0)+1;});
  return cats;
}

function buildFilters(){
  var bar=document.getElementById('filter-bar');
  var cats=getCategories();
  var keys=Object.keys(cats).sort();
  keys.forEach(function(cat){
    var btn=document.createElement('button');
    btn.className='filter-btn';
    btn.dataset.cat=cat;
    btn.textContent=cat+' ('+cats[cat]+')';
    btn.onclick=function(){setFilter(cat);};
    bar.insertBefore(btn,document.getElementById('filter-count'));
  });
  document.querySelector('[data-cat="all"]').onclick=function(){setFilter('all');};
}

function setFilter(cat){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.cat===cat);
  });
  render();
}

function getFiltered(){
  return allQuestions.filter(function(q,i){
    if(currentFilter!=='all'&&q.point!==currentFilter)return false;
    if(currentSearch){
      var s=currentSearch.toLowerCase();
      if(q.text.toLowerCase().indexOf(s)===-1&&q.point.toLowerCase().indexOf(s)===-1&&q.explain.toLowerCase().indexOf(s)===-1)return false;
    }
    return true;
  });
}

function render(){
  var list=document.getElementById('question-list');
  var filtered=getFiltered();
  document.getElementById('filter-count').textContent='共 '+filtered.length+' 题';

  if(!filtered.length){
    list.innerHTML='<div class="empty-state">没有找到匹配的题目</div>';
    return;
  }

  var html='';
  filtered.forEach(function(q){
    var idx=allQuestions.indexOf(q)+1;
    html+='<div class="q-item" data-id="'+q.id+'">';
    html+='<div class="q-header" onclick="this.parentNode.classList.toggle(\'expanded\')">';
    html+='<div class="q-idx">#'+String(idx).padStart(2,'0')+'</div>';
    html+='<div class="q-body">';
    html+='<div class="q-title">'+q.text+'</div>';
    html+='<div class="q-meta">';
    html+='<span class="q-tag">'+q.point+'</span>';
    html+='<span class="q-type-tag">'+q.type+'</span>';
    html+='<span class="q-answer-badge '+(q.answer?'true':'false')+'">'+(q.answer?'✓ 对':'✗ 错')+'</span>';
    html+='</div></div></div>';
    html+='<div class="q-detail">';
    html+='<div class="q-explain-label">解 析</div>';
    html+='<div class="q-explain-text">'+q.explain+'</div>';
    html+='</div></div>';
  });
  list.innerHTML=html;
}

document.getElementById('search-input').addEventListener('input',function(){
  currentSearch=this.value.trim();
  render();
});

document.getElementById('total-count').textContent=allQuestions.length;
buildFilters();
render();
})();
</script>
</body>
</html>
