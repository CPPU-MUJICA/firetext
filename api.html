<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>模型 API 设置</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto+Sans+SC:400,500,700,900|Noto+Serif+SC:700,900&display=swap&subset=chinese-simplified">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;font-family:'Noto Sans SC',sans-serif;background:#0a0a0a;color:#fff}

.app{max-width:900px;margin:0 auto;padding:clamp(16px,3vw,32px)}

.top-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.top-bar-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.top-bar-title{font-size:16px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.88)}
.top-bar-sep{width:1px;height:20px;background:rgba(255,255,255,.12)}
.top-bar-sub{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px}
.btn-back{font-size:12px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12);padding:6px 16px;cursor:pointer;background:none;letter-spacing:2px}
.btn-back:hover{color:#fff;border-color:rgba(255,255,255,.3)}

.notice{padding:14px 18px;background:rgba(212,170,48,.06);border:1px solid rgba(212,170,48,.12);font-size:12px;color:rgba(255,255,255,.5);line-height:1.8;margin-bottom:24px;border-radius:2px}
.notice strong{color:#d4aa30;font-weight:600}

.toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.btn{font-size:12px;padding:8px 18px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;border:none;letter-spacing:2px;transition:background .2s}
.btn-primary{background:#d4aa30;color:#0a0a0a;font-weight:700}
.btn-primary:hover{background:#e8c84a}
.btn-secondary{background:rgba(255,255,255,.06);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{background:rgba(255,255,255,.1);color:#fff}

.card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);padding:18px 20px;margin-bottom:14px;border-radius:2px}
.card-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.05)}
.card-head input[type=radio]{accent-color:#d4aa30;width:16px;height:16px}
.card-head label{font-size:12px;color:rgba(255,255,255,.45);cursor:pointer;user-select:none}
.card-title{flex:1;font-size:13px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:1px}
.btn-del{font-size:11px;color:#f44336;background:none;border:1px solid rgba(244,67,54,.25);padding:4px 12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
.btn-del:hover{background:rgba(244,67,54,.08)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
@media(max-width:640px){.grid{grid-template-columns:1fr}}
.f label{display:block;font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px;margin-bottom:4px}
.f input,.f select{width:100%;padding:9px 12px;font-size:13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#fff;font-family:'Noto Sans SC',sans-serif;outline:none;border-radius:2px}
.f input:focus,.f select:focus{border-color:rgba(212,170,48,.35)}
.f input::placeholder{color:rgba(255,255,255,.2)}
.f-full{grid-column:1/-1}
.hint{font-size:10px;color:rgba(255,255,255,.25);margin-top:4px;line-height:1.5}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;background:#1a1a1a;border:1px solid rgba(212,170,48,.3);color:#d4aa30;font-size:12px;display:none;z-index:100}
.toast.show{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<script src="js/api-config.js"></script>

<div class="app">
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="top-bar-title">模型 API</span>
      <span class="top-bar-sep"></span>
      <span class="top-bar-sub">多厂商密钥与模型 · 智能问答共用</span>
    </div>
    <button type="button" class="btn-back" onclick="location.href='index.html'">返 回</button>
  </div>

  <p class="notice">
    <strong>安全提示：</strong>API Key 仅保存在本机浏览器的 localStorage 中，不会上传到本项目服务器。请勿在公共电脑上保存密钥。OpenAI 兼容接口包括 DeepSeek、Azure OpenAI、Groq、Moonshot、智谱等（Base URL 与模型名按各厂商文档填写）。
  </p>

  <div class="toolbar">
    <button type="button" class="btn btn-primary" id="btn-save">保存全部</button>
    <button type="button" class="btn btn-secondary" id="btn-add">添加配置</button>
    <button type="button" class="btn btn-secondary" id="btn-reset">恢复默认模板</button>
  </div>

  <div id="cards"></div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

var cardsEl=document.getElementById('cards');
var toastEl=document.getElementById('toast');
var prevById={};

function showToast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  setTimeout(function(){toastEl.classList.remove('show');},2200);
}

function render(){
  var s=FireTextAI.load();
  prevById={};
  s.profiles.forEach(function(p){prevById[p.id]=p;});
  cardsEl.innerHTML='';
  s.profiles.forEach(function(p,index){
    var card=document.createElement('div');
    card.className='card';
    card.dataset.id=p.id;
    var keyPlaceholder='留空则保留已保存的密钥';
    card.innerHTML=
      '<div class="card-head">'+
        '<input type="radio" name="activePf" value="'+escAttr(p.id)+'" id="r_'+escAttr(p.id)+'"'+(s.activeId===p.id?' checked':'')+'>'+
        '<label for="r_'+escAttr(p.id)+'">智能问答默认使用</label>'+
        '<span class="card-title">配置 '+(index+1)+'</span>'+
        (s.profiles.length>1?'<button type="button" class="btn-del" data-del="'+escAttr(p.id)+'">删除</button>':'')+
      '</div>'+
      '<div class="grid">'+
        '<div class="f"><label>显示名称</label><input class="pf-name" type="text" value="'+escAttr(p.name)+'" placeholder="如 DeepSeek"></div>'+
        '<div class="f"><label>接口类型</label><select class="pf-provider">'+
          '<option value="openai"'+(p.provider!=='anthropic'?' selected':'')+'>OpenAI 兼容（DeepSeek / OpenAI / 等）</option>'+
          '<option value="anthropic"'+(p.provider==='anthropic'?' selected':'')+'>Anthropic Claude</option>'+
        '</select></div>'+
        '<div class="f f-full"><label>Base URL</label><input class="pf-url" type="text" value="'+escAttr(p.baseUrl)+'" placeholder="https://api.deepseek.com/v1 或 https://api.anthropic.com">'+
        '<p class="hint">OpenAI 兼容：通常以 <code>/v1</code> 结尾，请求 <code>/v1/chat/completions</code>。Claude 填 <code>https://api.anthropic.com</code>（自动拼接 <code>/v1/messages</code>）。</p></div>'+
        '<div class="f"><label>模型 ID</label><input class="pf-model" type="text" value="'+escAttr(p.model)+'" placeholder="deepseek-chat / gpt-4o-mini / claude-3-5-sonnet-20241022"></div>'+
        '<div class="f"><label>API Key</label><input class="pf-key" type="password" value="" autocomplete="off" placeholder="'+keyPlaceholder+'">'+
        '<p class="hint">编辑时若不修改密钥请留空。</p></div>'+
      '</div>';
    cardsEl.appendChild(card);
  });

  cardsEl.querySelectorAll('[data-del]').forEach(function(btn){
    btn.onclick=function(){
      var id=btn.getAttribute('data-del');
      if(!confirm('确定删除该配置？'))return;
      var st=FireTextAI.load();
      st.profiles=st.profiles.filter(function(x){return x.id!==id;});
      if(!st.profiles.length){showToast('至少保留一条');return;}
      if(st.activeId===id)st.activeId=st.profiles[0].id;
      FireTextAI.saveFull(st);
      render();
      showToast('已删除');
    };
  });
}

function escAttr(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function collect(){
  var st=FireTextAI.load();
  var prev=st.profiles.slice();
  var pmap={};
  prev.forEach(function(p){pmap[p.id]=p;});

  var nodes=cardsEl.querySelectorAll('.card');
  var profiles=[];
  var activeId=null;
  document.querySelectorAll('input[name="activePf"]').forEach(function(r){
    if(r.checked)activeId=r.value;
  });

  nodes.forEach(function(card){
    var id=card.dataset.id;
    var name=card.querySelector('.pf-name').value.trim()||'未命名';
    var provider=card.querySelector('.pf-provider').value;
    var baseUrl=card.querySelector('.pf-url').value.trim();
    var model=card.querySelector('.pf-model').value.trim();
    var keyInput=card.querySelector('.pf-key').value;
    var apiKey=keyInput;
    if(!apiKey&&pmap[id])apiKey=pmap[id].apiKey||'';
    profiles.push({id:id,name:name,provider:provider,baseUrl:baseUrl,model:model,apiKey:apiKey});
  });

  return {activeId:activeId||profiles[0].id,profiles:profiles};
}

document.getElementById('btn-save').onclick=function(){
  try{
    var c=collect();
    FireTextAI.saveFull(c);
    showToast('已保存');
    render();
  }catch(e){
    alert(e.message||String(e));
  }
};

document.getElementById('btn-add').onclick=function(){
  var st=collect();
  var id=FireTextAI.newId();
  st.profiles.push({id:id,name:'新配置',provider:'openai',baseUrl:'https://api.deepseek.com/v1',model:'deepseek-chat',apiKey:''});
  FireTextAI.saveFull(st);
  render();
  showToast('已添加，请填写后保存');
};

document.getElementById('btn-reset').onclick=function(){
  if(!confirm('将重置为默认三条模板（未填密钥）。已保存的密钥会丢失，确定？'))return;
  var d=FireTextAI.defaultState();
  FireTextAI.save(d);
  render();
  showToast('已恢复默认模板');
};

render();
})();
</script>
</body>
</html>
